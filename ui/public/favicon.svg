<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Primary gradient - Deep blue to cyan -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    <!-- Secondary gradient - Accent glow -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner shadow -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000" flood-opacity=".2" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#primaryGrad)" stroke-width="4" opacity="0.5"/>

  <!-- Outer ring - Neural network representation -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#primaryGrad)" stroke-width="3" stroke-dasharray="20 10" opacity="0.6"/>

  <!-- Q letter stylized as brain/cortex -->
  <g filter="url(#glow)">
    <!-- Main Q circle -->
    <circle cx="256" cy="240" r="100" fill="none" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round"/>

    <!-- Q tail - extending to form neural connection -->
    <path d="M320 300 L380 360 L400 340" fill="none" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Neural nodes -->
    <circle cx="168" cy="180" r="12" fill="#38bdf8" opacity="0.8"/>
    <circle cx="344" cy="180" r="12" fill="#38bdf8" opacity="0.8"/>
    <circle cx="168" cy="300" r="12" fill="#38bdf8" opacity="0.8"/>
    <circle cx="400" cy="340" r="14" fill="#0ea5e9"/>

    <!-- Neural connections -->
    <line x1="168" y1="180" x2="200" y2="175" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
    <line x1="344" y1="180" x2="312" y2="175" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
    <line x1="168" y1="300" x2="200" y2="290" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Inner cortex pattern -->
  <g opacity="0.3">
    <path d="M220 200 Q256 180 292 200" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <path d="M210 240 Q256 220 302 240" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <path d="M220 280 Q256 260 292 280" fill="none" stroke="#38bdf8" stroke-width="2"/>
  </g>

  <!-- Central dot - consciousness point -->
  <circle cx="256" cy="240" r="16" fill="url(#accentGrad)" filter="url(#glow)"/>
  <circle cx="256" cy="240" r="8" fill="#fff" opacity="0.9"/>
</svg>
