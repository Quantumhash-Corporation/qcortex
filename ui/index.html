<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />

    <!-- Primary Meta Tags -->
    <title>QCortex | AI Gateway Dashboard</title>
    <meta name="title" content="QCortex | AI Gateway Dashboard" />
    <meta name="description" content="QCortex Gateway Dashboard - Professional AI assistant control center for managing channels, agents, and sessions." />
    <meta name="author" content="QCortex" />
    <meta name="theme-color" content="#0ea5e9" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0284c7" media="(prefers-color-scheme: light)" />

    <!-- PWA & Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QCortex" />
    <meta name="application-name" content="QCortex" />
    <meta name="msapplication-TileColor" content="#0ea5e9" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="QCortex | AI Gateway Dashboard" />
    <meta property="og:description" content="Professional AI assistant control center for managing channels, agents, and sessions." />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="QCortex | AI Gateway Dashboard" />
    <meta property="twitter:description" content="Professional AI assistant control center for managing channels, agents, and sessions." />

    <!-- Google Fonts - Inter for better typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Disable tap highlight on mobile -->
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <qcortex-app></qcortex-app>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
