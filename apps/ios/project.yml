name: QCortex
options:
  bundleIdPrefix: ai.qcortex
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  QCortexKit:
    path: ../shared/QCortexKit
  Swabble:
    path: ../../Swabble

schemes:
  QCortex:
    shared: true
    build:
      targets:
        QCortex: all
    test:
      targets:
        - QCortexTests

targets:
  QCortex:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: QCortexShareExtension
        embed: true
      - target: QCortexActivityWidget
        embed: true
      - target: QCortexWatchApp
      - package: QCortexKit
      - package: QCortexKit
        product: QCortexChatUI
      - package: QCortexKit
        product: QCortexProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/QCortex.entitlements
        CODE_SIGN_STYLE: "$(QCORTEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(QCORTEX_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(QCORTEX_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(QCORTEX_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: QCortex
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.qcortex.ios
            CFBundleURLSchemes:
              - qcortex
        CFBundleShortVersionString: "2026.3.7"
        CFBundleVersion: "20260307"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.qcortex.ios.bgrefresh
        NSLocalNetworkUsageDescription: QCortex discovers and connects to your QCortex gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _qcortex-gw._tcp
        NSCameraUsageDescription: QCortex can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: QCortex uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: QCortex can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: QCortex needs microphone access for voice wake.
        NSSpeechRecognitionUsageDescription: QCortex uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  QCortexShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: QCortexKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(QCORTEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(QCORTEX_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(QCORTEX_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(QCORTEX_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: QCortex Share
        CFBundleShortVersionString: "2026.3.7"
        CFBundleVersion: "20260307"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  QCortexActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/QCortexActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(QCORTEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(QCORTEX_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(QCORTEX_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: QCortex Activity
        CFBundleShortVersionString: "2026.3.7"
        CFBundleVersion: "20260307"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  QCortexWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: QCortexWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(QCORTEX_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: QCortex
        CFBundleShortVersionString: "2026.3.7"
        CFBundleVersion: "20260307"
        WKCompanionAppBundleIdentifier: "$(QCORTEX_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  QCortexWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(QCORTEX_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: QCortex
        CFBundleShortVersionString: "2026.3.7"
        CFBundleVersion: "20260307"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(QCORTEX_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  QCortexTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
    dependencies:
      - target: QCortex
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(QCORTEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(QCORTEX_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.qcortex.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/QCortex.app/QCortex"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: QCortexTests
        CFBundleShortVersionString: "2026.3.7"
        CFBundleVersion: "20260307"
